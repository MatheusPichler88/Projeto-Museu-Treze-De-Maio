<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu - Itens do Acervo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <img th:src="@{/images/logo.png}" alt="Logo do Museu" class="logo">
        </div>
        <nav class="nav-menu">
            <a th:href="@{/}" class="nav-link">Início</a>
            <a th:href="@{/acervo}" class="nav-link active">Acervo</a>
            <a th:href="@{/login}" class="btn-login-nav">Entrar</a>
        </nav>
    </header>

    <main class="acervo-container">
        <div class="acervo-header">
            <h2>Itens do Acervo</h2>
            <a th:href="@{/acervo/novo}" class="btn-add">+ Novo Item</a>
        </div>

        <div class="table-responsive">
            <table class="acervo-table">
                <thead>
                    <tr>
                        <th>Cód. Patrimônio</th>
                        <th>Título</th>
                        <th>Autor / Criador</th>
                        <th>Ano</th>
                        <th>Qtd</th>
                        <th>Estado de Conservação</th>
                        <th>Localização Física</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${itens}">
                        <td th:text="${item.codigoPatrimonio}" class="text-bold">PATR-001</td>
                        <td th:text="${item.titulo}">Monalisa</td>
                        <td th:text="${item.autorCriador}">Leonardo da Vinci</td>
                        <td th:text="${item.anoRegistro}">1503</td>
                        <td th:text="${item.quantidade}">1</td>
                        <td>
                            <span th:text="${item.estadoConservacao}" 
                                  th:class="'badge badge-' + ${item.estadoConservacao.toLowerCase()}">
                                EXCELENTE
                            </span>
                        </td>
                        <td th:text="${item.localizacao_fisica}">Sala A - Ala Norte</td>
                        <td class="actions-cell">
                            <a th:href="@{/acervo/editar/{id}(id=${item.id})}" class="btn-edit">Editar</a>
                            <a th:href="@{/acervo/deletar/{id}(id=${item.id})}" class="btn-delete" onclick="return confirm('Deseja excluir este item?')">Excluir</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(itens)}">
                        <td colspan="8" class="text-center">Nenhum item cadastrado no acervo.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
