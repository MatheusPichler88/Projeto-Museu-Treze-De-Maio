<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo — Museu Treze de Maio</title>
    <link rel="stylesheet" th:href="@{/css/museu.css}" />
</head>
<body>

<div class="layout-wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar('acervo')}"></div>

    <main class="main-content">

        <div class="page-header" style="display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;">
            <div>
                <h1 class="page-title">Acervo</h1>
                <p class="page-subtitle">Consulte os itens cadastrados no acervo do museu</p>
            </div>
            <a th:if="${loggedIn}" th:href="@{/itens/novo}" class="btn btn-primary" style="width:auto;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Novo Item
            </a>
        </div>

        <div th:if="${#lists.isEmpty(itens)}" class="card">
            <div class="card-body empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
                </svg>
                <p>Nenhum item cadastrado no acervo ainda.</p>
            </div>
        </div>

        <div th:each="item : ${itens}" class="list-card">
            <div class="list-card-header">
                <div>
                    <div class="list-card-title" th:text="${item.titulo}">Título do Item</div>
                    <div class="list-card-desc" th:text="${item.descricao} ?: 'Sem descrição cadastrada.'">Descrição do item.</div>
                </div>
                <div class="list-card-actions" th:if="${loggedIn}">
                    <a th:href="@{/itens/editar/{id}(id=${item.id})}" class="btn-icon-edit" title="Editar">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                        </svg>
                    </a>
                    <a th:href="@{/itens/desativar/{id}(id=${item.id})}" class="btn-icon-delete" th:title="${item.ativo} ? 'Desativar' : 'Ativar'">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                            <path th:if="${item.ativo}" stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                            <path th:unless="${item.ativo}" stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                        </svg>
                    </a>
                </div>
            </div>

            <div class="meta-grid">
                <div class="meta-item">
                    <label>Código</label>
                    <p class="mono" th:text="${item.codigoPatrimonio}">PAT-001</p>
                </div>
                <div class="meta-item">
                    <label>Categoria</label>
                    <p th:text="${item.categoria != null} ? ${item.categoria.nome} : '—'">Categoria</p>
                </div>
                <div class="meta-item">
                    <label>Autor / Criador</label>
                    <p th:text="${item.autorCriador} ?: '—'">Autor</p>
                </div>
                <div class="meta-item">
                    <label>Quantidade</label>
                    <p th:text="${item.quantidade}">1</p>
                </div>
            </div>

            <div style="display:flex; gap:0.5rem; margin-top: 1rem;">
                <span th:switch="${item.estadoConservacao?.name()}">
                    <span th:case="'EXCELENTE'" class="badge badge-emerald">Excelente</span>
                    <span th:case="'BOM'" class="badge badge-green">Bom</span>
                    <span th:case="'REGULAR'" class="badge badge-yellow">Regular</span>
                    <span th:case="'RUIM'" class="badge badge-red">Ruim</span>
                    <span th:case="'EM_RESTAURO'" class="badge badge-gray">Em Restauro</span>
                    <span th:case="*" class="badge badge-gray">—</span>
                </span>
                <span th:if="${item.ativo}" class="badge badge-green">Ativo</span>
                <span th:unless="${item.ativo}" class="badge badge-inactive">Inativo</span>
            </div>
        </div>

    </main>
</div>

</body>
</html>
