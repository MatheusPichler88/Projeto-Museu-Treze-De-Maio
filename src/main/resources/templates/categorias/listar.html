<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias — Museu Treze de Maio</title>
    <link rel="stylesheet" th:href="@{/css/museu.css}" />
</head>
<body>

<div class="layout-wrapper">

    <div th:replace="~{fragments/sidebar :: sidebar('categorias')}"></div>

    <main class="main-content">

        <div class="page-header" style="display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;">
            <div>
                <h1 class="page-title">Categorias</h1>
                <p class="page-subtitle">Visualize e gerencie as categorias cadastradas</p>
            </div>
            <a th:href="@{/categorias/novo}" class="btn btn-primary" style="width:auto;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Nova Categoria
            </a>
        </div>

        <div th:if="${#lists.isEmpty(categorias)}" class="card">
            <div class="card-body empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 0 0-1.883 2.542l.857 6a2.25 2.25 0 0 0 2.227 1.932H19.05a2.25 2.25 0 0 0 2.227-1.932l.857-6a2.25 2.25 0 0 0-1.883-2.542m-16.5 0V6A2.25 2.25 0 0 1 6 3.75h3.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12a1.5 1.5 0 0 0 1.06.44H18A2.25 2.25 0 0 1 20.25 9v.776" />
                </svg>
                <p>Nenhuma categoria cadastrada.</p>
            </div>
        </div>

        <div class="categories-grid">
            <div th:each="categoria : ${categorias}" class="list-card">
                <div class="list-card-header">
                    <div>
                        <div class="list-card-title" th:text="${categoria.nome}">Nome da Categoria</div>
                        <div class="list-card-desc" th:text="${categoria.descricao} ?: 'Sem descrição cadastrada.'">Descrição da categoria.</div>
                    </div>
                    <div class="list-card-actions">
                        <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}" class="btn-icon-edit" title="Editar">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                            </svg>
                        </a>
                        <a th:href="@{/categorias/desativar/{id}(id=${categoria.id})}" class="btn-icon-delete" th:title="${categoria.ativo} ? 'Desativar' : 'Ativar'">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                                <path th:if="${categoria.ativo}" stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                                <path th:unless="${categoria.ativo}" stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                            </svg>
                        </a>
                    </div>
                </div>

                <div style="display:flex; align-items:center; gap:0.5rem; margin-top: 1rem;">
                    <span class="item-count" th:text="${categoria.itens != null ? #lists.size(categoria.itens) : 0} + ' item(ns)'">0 item(ns)</span>
                    <span th:if="${categoria.ativo}" class="badge badge-green">Ativa</span>
                    <span th:unless="${categoria.ativo}" class="badge badge-inactive">Inativa</span>
                </div>
            </div>
        </div>

    </main>
</div>

</body>
</html>
