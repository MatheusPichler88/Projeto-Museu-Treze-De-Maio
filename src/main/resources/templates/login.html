<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museu - Autenticação</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">

    <div class="auth-container">
        
        <div class="auth-box login-box">
            <h2>Sign In</h2>
            <p class="subtitle">Insira suas credenciais para acessar o acervo</p>
            
            <form th:action="@{/login}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Seu usuário" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required>
                </div>
                
                <button type="submit" class="btn-auth">Entrar</button>
            </form>
        </div>

        <div class="auth-box register-box">
            <h2>Sign Up</h2>
            <p class="subtitle">Crie sua conta para interagir com o museu</p>
            
            <form th:action="@{/usuarios/cadastrar}" method="POST">
                <div class="form-group">
                    <label for="reg-nome">Nome Completo</label>
                    <input type="text" id="reg-nome" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" placeholder="Escolha um usuário" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="senha" placeholder="Crie uma senha" required>
                </div>
                
                <button type="submit" class="btn-auth btn-signup">Cadastrar</button>
            </form>
        </div>

    </div>

</body>
</html>
